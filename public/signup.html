<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | EchoMentor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        
        <div class="auth-card">
            <div class="auth-card-content">
                <div class="brand">
                    <div class="logo-icon-wrapper">
                        <i data-lucide="mic" class="logo-icon"></i>
                    </div>
                    <h1>EchoMentor</h1>
                </div>
                
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p>Join EchoMentor and start improving your presentation skills with AI.</p>
                </div>
                
                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <div class="input-container">
                            <i data-lucide="user" class="input-icon"></i>
                            <input type="text" id="name" name="name" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-container">
                            <i data-lucide="mail" class="input-icon"></i>
                            <input type="email" id="email" name="email" placeholder="you@example.com" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-container">
                            <i data-lucide="lock" class="input-icon"></i>
                            <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6">
                        </div>
                    </div>
                    
                    <div id="errorMessage" class="error-message"></div>
                    <div id="successMessage" class="success-message"></div>
                    
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">Sign Up</span>
                        <i data-lucide="arrow-right" class="btn-icon"></i>
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p>Already have an account? <a href="index.html" class="signup-link">Log In</a></p>
                </div>
            </div>
            
            <div class="auth-visual">
                <div class="visual-content">
                    <div class="testimonial">
                        <p class="quote">"Practicing with EchoMentor before my thesis defense gave me the confidence I needed. The AI's pacing and tone feedback was spot on!"</p>
                        <div class="author">
                            <div class="author-avatar">
                                <img src="https://ui-avatars.com/api/?name=David+Kim&background=random" alt="David K.">
                            </div>
                            <div class="author-info">
                                <strong>David K.</strong>
                                <span>Graduate Student</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const signupForm = document.getElementById('signupForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = submitBtn.querySelector('.btn-text');
        
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            submitBtn.classList.add('loading');
            btnText.textContent = 'Creating account...';
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successMessage.textContent = 'Account created successfully! Redirecting to login...';
                    successMessage.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    errorMessage.textContent = data.message || 'Error creating account. Please try again.';
                    errorMessage.style.display = 'block';
                    submitBtn.classList.remove('loading');
                    btnText.textContent = 'Sign Up';
                }
            } catch (error) {
                console.error('Signup error:', error);
                errorMessage.textContent = 'Network error. Please make sure the server is running.';
                errorMessage.style.display = 'block';
                submitBtn.classList.remove('loading');
                btnText.textContent = 'Sign Up';
            }
        });
    </script>
</body>
</html>
